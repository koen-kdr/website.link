<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // ==========================================
        // CONFIGURATIE
        // ==========================================
        // Vul hier de uiteindelijke link in waar ze heen moeten:
        const mijnBestemming = "https://naklar.secure.malmberg.nl/book";
        
        // Vul hier het pad in naar je centrale index.html (relatief of absoluut)
        const centraleLayout = "/src/index.html";
        // ==========================================

        // Dit script plakt de bestemming achter de centrale layout
        window.location.href = centraleLayout + "?url=" + encodeURIComponent(mijnBestemming);
    </script>
</head>
<body style="background: #020617;">
    <!-- Val terug op een simpele tekst mocht JS uitstaan -->
    <p style="color: white; font-family: sans-serif; text-align: center; margin-top: 50px;">
        Je wordt doorgestuurd... <a href="#" id="backup-link" style="color: #3b82f6;">Klik hier</a> als er niets gebeurt.
    </p>
    <script>
        document.getElementById('backup-link').href = mijnBestemming;
    </script>
</body>
</html>
