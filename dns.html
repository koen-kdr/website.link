<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Je wordt doorgestuurd...</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-3: #ec4899;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 1.5rem;
        }

        /* Dynamische Mesh Achtergrond */
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            animation: mesh-move 20s infinite alternate ease-in-out;
        }

        @keyframes mesh-move {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Glassmorphism Kaart */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            padding: 3rem 2rem;
            border-radius: 2.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Geanimeerde domeinnaam */
        .domain-text {
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6, #60a5fa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .domain-text-internal {
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
            background-size: 200% auto;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Progress Bar Container */
        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
            box-shadow: 0 0 15px var(--accent-1);
            transition: width 0.1s linear;
        }

        /* Floating Icoon Animatie */
        .floating-icon {
            animation: float-y 4s ease-in-out infinite;
        }

        @keyframes float-y {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }

        /* Knoppen */
        .btn {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        /* Overlay / Pop-up */
        #safety-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 50;
            border-radius: 2.5rem;
            padding: 2rem;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="mesh-gradient" id="mesh-bg"></div>

    <div class="glass-card overflow-hidden">
        <!-- Veiligheid Pop-up (verschijnt na timer bij onveilige link) -->
        <div id="safety-overlay" class="flex">
            <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-6 border border-red-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold mb-2 text-white">Let op: Onbeveiligd</h3>
            <p class="text-sm text-slate-400 mb-8 px-4 text-center leading-relaxed">De bestemming gebruikt geen HTTPS. Je verbinding is niet versleuteld.</p>
            <button id="confirm-unsafe" class="btn w-full bg-red-600 py-4 rounded-xl text-white font-bold mb-3 shadow-lg shadow-red-600/20">
                Ik begrijp het, ga door
            </button>
            <button onclick="history.back()" class="text-xs text-slate-500 hover:text-white transition-colors">
                Terug naar veiligheid
            </button>
        </div>

        <!-- Tekst sectie -->
        <div class="space-y-2 mb-8">
            <p id="label-text" class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Je gaat naar</p>
            <h2 id="target-domain" class="domain-text text-3xl font-extrabold truncate px-2">Laden...</h2>
        </div>

        <!-- Icoon sectie -->
        <div id="icon-wrapper" class="floating-icon w-16 h-16 mx-auto mb-8 relative">
            <div id="icon-bg" class="absolute inset-0 bg-blue-500/20 blur-xl rounded-full"></div>
            <div id="icon-container" class="relative z-10 w-full h-full bg-slate-900/80 border border-white/10 rounded-2xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" id="main-svg" class="w-8 h-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </div>
        </div>

        <!-- Voortgang sectie -->
        <div class="mb-10">
            <div class="flex justify-between items-end mb-3">
                <div class="flex items-center space-x-2">
                    <span id="status-dot" class="flex h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>
                    <span id="status-label" class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Verbinding maken</span>
                </div>
                <span id="progress-text" class="text-xs font-mono font-bold text-slate-300">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </div>

        <!-- Acties -->
        <div class="space-y-3">
            <a id="direct-link" href="#" class="btn block w-full bg-blue-600 py-4 rounded-2xl shadow-[0_0_30px_-5px_rgba(37,99,235,0.3)]">
                <span class="block text-white font-extrabold text-lg">Ga nu verder</span>
            </a>
            
            <button onclick="history.back()" class="btn block w-full py-3 text-slate-500 hover:text-white font-bold text-xs bg-white/5 rounded-xl border border-white/5">
                Annuleren
            </button>
        </div>

        <!-- Veiligheids Status -->
        <div id="security-badge" class="status-badge mt-8 py-2 px-5 rounded-full inline-flex items-center space-x-2">
            <div id="security-icon" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
            <p id="security-text" class="text-[8px] font-black tracking-[0.2em] text-slate-500 uppercase">Controleren...</p>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATIE - PAS HIER JE LINK AAN
        // ==========================================
        const targetURL = "https://mijn.host/cp/domains/koenkdr.nl/dns-settings/"; 
        const redirectDelay = 5000;
        // ==========================================

        const elements = {
            domain: document.getElementById('target-domain'),
            progress: document.getElementById('progress-bar'),
            text: document.getElementById('progress-text'),
            link: document.getElementById('direct-link'),
            badge: document.getElementById('security-badge'),
            badgeText: document.getElementById('security-text'),
            badgeIcon: document.getElementById('security-icon'),
            label: document.getElementById('label-text'),
            mainIcon: document.getElementById('main-svg'),
            iconBg: document.getElementById('icon-bg'),
            statusDot: document.getElementById('status-dot'),
            statusLabel: document.getElementById('status-label'),
            favicon: document.getElementById('favicon'),
            mesh: document.getElementById('mesh-bg'),
            overlay: document.getElementById('safety-overlay'),
            confirmBtn: document.getElementById('confirm-unsafe')
        };

        let isUnsafe = false;
        let startTime = null;
        let animationFrame = null;

        try {
            const url = new URL(targetURL);
            elements.domain.innerText = url.hostname;
            elements.link.href = targetURL;

            // Dynamische titel voor het tabblad aanpassen
            document.title = "Je wordt doorgestuurd naar: " + url.hostname;

            const isInternal = url.hostname.includes('koenkdr.nl');
            isUnsafe = url.protocol !== 'https:';

            // Thema styling op basis van domein
            if (isInternal) {
                elements.label.innerText = "Interne bestemming";
                elements.domain.classList.add('domain-text-internal');
                elements.link.style.background = "linear-gradient(135deg, #d97706, #b45309)";
                elements.mainIcon.classList.replace('text-blue-400', 'text-amber-400');
                elements.iconBg.classList.replace('bg-blue-500/20', 'bg-amber-500/20');
                elements.statusDot.classList.replace('bg-blue-500', 'bg-amber-500');
                elements.progress.style.background = "linear-gradient(90deg, #f59e0b, #fbbf24)";
                elements.mesh.style.background = `radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(180, 83, 9, 0.1) 0px, transparent 50%)`;
            }

            // Veiligheidsindicator badge onderaan
            if (!isUnsafe) {
                elements.badgeIcon.classList.replace('bg-slate-500', 'bg-emerald-500');
                elements.badgeText.classList.replace('text-slate-500', 'text-emerald-500');
                elements.badgeText.innerText = "Veilige Verbinding";
                elements.favicon.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${isInternal ? '🏠' : '🛡️'}</text></svg>`;
            } else {
                elements.badgeIcon.classList.replace('bg-slate-500', 'bg-red-500');
                elements.badgeText.classList.replace('text-slate-500', 'text-red-500');
                elements.badgeText.innerText = "Onbeveiligde Link";
                elements.favicon.href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚠️</text></svg>";
            }

        } catch (e) {
            elements.domain.innerText = "Ongeldige Link";
            document.title = "Fout: Ongeldige link";
        }

        // De universele redirect functie
        function startRedirect() {
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = timestamp - startTime;
                const percentage = Math.min((progress / redirectDelay) * 100, 100);
                
                elements.progress.style.width = percentage + '%';
                elements.text.innerText = Math.floor(percentage) + '%';
                
                if (progress < redirectDelay) {
                    animationFrame = window.requestAnimationFrame(step);
                } else {
                    // Timer is klaar
                    if (isUnsafe) {
                        showSafetyWarning();
                    } else {
                        window.location.href = targetURL;
                    }
                }
            }
            animationFrame = window.requestAnimationFrame(step);
        }

        function showSafetyWarning() {
            elements.statusLabel.innerText = "Actie vereist";
            elements.statusDot.classList.add('bg-red-500');
            elements.statusDot.classList.remove('bg-blue-500', 'bg-amber-500');
            
            elements.overlay.style.display = 'flex';
            setTimeout(() => {
                elements.overlay.style.opacity = '1';
            }, 10);
        }

        elements.confirmBtn.onclick = () => {
            window.location.href = targetURL;
        };

        window.onload = () => {
            // Start de timer altijd direct
            startRedirect();
        };
    </script>
</body>
</html>
