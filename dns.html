<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Je wordt doorgestuurd...</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.75);
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-3: #ec4899;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            /* Zorg dat we kunnen scrollen op hele kleine schermpjes als de kaart hoog wordt */
            overflow-y: auto; 
        }

        /* Dynamische Mesh Achtergrond */
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.2) 0px, transparent 55%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.2) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 55%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 55%);
            animation: mesh-move 12s infinite alternate ease-in-out;
        }

        @keyframes mesh-move {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Glassmorphism Kaart - Nu met min-height en flexibele groei */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 440px;
            padding: 3.5rem 2rem;
            border-radius: 3rem;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: card-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        @keyframes card-appear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Geanimeerde domeinnaam - Nu met word-break en dynamische grootte */
        .domain-text {
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6, #60a5fa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.3));
            /* Belangrijk voor lange links */
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            line-height: 1.2;
            display: block;
        }

        .domain-text-internal {
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.3));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(0, 0, 0, 0.4);
            height: 10px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
            box-shadow: 0 0 20px var(--accent-1);
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: progress-shine 2s infinite;
        }

        @keyframes progress-shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Icoon Pulse */
        .icon-glow-pulse {
            animation: float-pulse 4s ease-in-out infinite;
        }

        @keyframes float-pulse {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4)); }
            50% { transform: translateY(-12px) scale(1.08); filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.7)); }
        }

        .btn-pulse {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px -5px rgba(37,99,235,0.3);
        }

        .btn-pulse:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 35px -8px rgba(37,99,235,0.5);
            filter: brightness(1.15);
        }

        .danger-pulse {
            animation: danger-glow 1.5s infinite alternate ease-in-out;
        }

        @keyframes danger-glow {
            0% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); transform: scale(1.1); }
        }

        /* Overlay */
        #safety-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 50;
            border-radius: 3rem;
            padding: 2rem;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(25px);
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <div class="mesh-gradient" id="mesh-bg"></div>

    <div class="glass-card overflow-hidden">
        <!-- Veiligheid Pop-up -->
        <div id="safety-overlay" class="flex">
            <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mb-6 border border-red-500/40 danger-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-2xl font-extrabold mb-3 text-white">Let op: Gevaar</h3>
            <p class="text-sm text-slate-400 mb-10 px-6 text-center leading-relaxed">De bestemming gebruikt geen <strong>beveiligde verbinding (HTTPS)</strong>. Je privacy kan in het geding zijn.</p>
            <button id="confirm-unsafe" class="btn-pulse w-full bg-red-600 py-4 rounded-2xl text-white font-extrabold mb-4 shadow-xl">
                Ik begrijp het, ga door
            </button>
            <button onclick="history.back()" class="text-xs font-bold text-slate-500 hover:text-white transition-all uppercase tracking-widest">
                Terug naar veiligheid
            </button>
        </div>

        <!-- Tekst sectie - Aangepast voor lange domeinen -->
        <div class="space-y-3 mb-8">
            <p id="label-text" class="text-[11px] font-black uppercase tracking-[0.4em] text-slate-500">Redirecting to</p>
            <div class="flex justify-center w-full px-2">
                <h2 id="target-domain" class="domain-text text-2xl md:text-3xl font-extrabold">Laden...</h2>
            </div>
        </div>

        <!-- Icoon sectie -->
        <div id="icon-wrapper" class="icon-glow-pulse w-20 h-20 mx-auto mb-8 relative">
            <div id="icon-bg" class="absolute inset-0 bg-blue-500/30 blur-2xl rounded-full"></div>
            <div id="icon-container" class="relative z-10 w-full h-full bg-slate-900/90 border border-white/20 rounded-[2rem] flex items-center justify-center shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" id="main-svg" class="w-10 h-10 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </div>
        </div>

        <!-- Voortgang sectie -->
        <div class="mb-10">
            <div class="flex justify-between items-end mb-4 px-1">
                <div class="flex items-center space-x-3">
                    <span id="status-dot" class="flex h-3 w-3 rounded-full bg-blue-500 animate-ping"></span>
                    <span id="status-label" class="text-[12px] font-black text-slate-400 uppercase tracking-widest">Verbinden...</span>
                </div>
                <span id="progress-text" class="text-sm font-black text-slate-200">0%</span>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </div>

        <!-- Acties -->
        <div class="space-y-4">
            <a id="direct-link" href="#" class="btn-pulse block w-full bg-blue-600 py-5 rounded-3xl">
                <span class="block text-white font-black text-xl tracking-tight">Direct doorgaan</span>
            </a>
            
            <button onclick="history.back()" class="w-full py-4 text-slate-400 hover:text-white font-bold text-sm bg-white/5 rounded-2xl border border-white/5 transition-all hover:bg-white/10">
                Annuleren
            </button>
        </div>

        <!-- Veiligheids Status Badge -->
        <div id="security-badge" class="mt-8 py-3 px-6 rounded-2xl inline-flex items-center space-x-3 bg-slate-950/40 border border-white/5 shadow-inner">
            <div id="security-icon" class="w-2 h-2 rounded-full bg-slate-500 shadow-[0_0_10px_rgba(255,255,255,0.2)]"></div>
            <p id="security-text" class="text-[10px] font-black tracking-[0.25em] text-slate-500 uppercase">Checking safety</p>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATIE - PAS HIER JE LINK AAN
        // ==========================================
        const targetURL = "https://mijn.host/cp/domains/koenkdr.nl/dns-settings/"; 
        const redirectDelay = 5000;
        // ==========================================

        const elements = {
            domain: document.getElementById('target-domain'),
            progress: document.getElementById('progress-bar'),
            text: document.getElementById('progress-text'),
            link: document.getElementById('direct-link'),
            badge: document.getElementById('security-badge'),
            badgeText: document.getElementById('security-text'),
            badgeIcon: document.getElementById('security-icon'),
            label: document.getElementById('label-text'),
            mainIcon: document.getElementById('main-svg'),
            iconBg: document.getElementById('icon-bg'),
            statusDot: document.getElementById('status-dot'),
            statusLabel: document.getElementById('status-label'),
            favicon: document.getElementById('favicon'),
            mesh: document.getElementById('mesh-bg'),
            overlay: document.getElementById('safety-overlay'),
            confirmBtn: document.getElementById('confirm-unsafe')
        };

        let isUnsafe = false;
        let startTime = null;
        let animationFrame = null;

        try {
            const url = new URL(targetURL);
            let hostname = url.hostname;
            
            // Pas tekstgrootte aan op basis van lengte
            if (hostname.length > 25) {
                elements.domain.style.fontSize = '1.25rem';
            } else if (hostname.length > 15) {
                elements.domain.style.fontSize = '1.75rem';
            }

            elements.domain.innerText = hostname;
            elements.link.href = targetURL;

            const isInternal = hostname.includes('koenkdr.nl');
            isUnsafe = url.protocol !== 'https:';

            if (isInternal) {
                elements.label.innerText = "Interne Bestemming";
                elements.domain.classList.add('domain-text-internal');
                elements.link.style.background = "linear-gradient(135deg, #d97706, #b45309)";
                elements.link.style.boxShadow = "0 15px 35px -5px rgba(217, 119, 6, 0.4)";
                elements.mainIcon.classList.replace('text-blue-400', 'text-amber-400');
                elements.iconBg.classList.replace('bg-blue-500/30', 'bg-amber-500/30');
                elements.statusDot.classList.replace('bg-blue-500', 'bg-amber-500');
                elements.progress.style.background = "linear-gradient(90deg, #f59e0b, #fbbf24)";
                elements.progress.style.boxShadow = "0 0 20px #f59e0b";
                elements.mesh.style.background = `radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.2) 0px, transparent 55%), radial-gradient(at 100% 100%, rgba(180, 83, 9, 0.2) 0px, transparent 55%)`;
            }

            if (!isUnsafe) {
                elements.badgeIcon.classList.replace('bg-slate-500', 'bg-emerald-500');
                elements.badgeIcon.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.6)";
                elements.badgeText.classList.replace('text-slate-500', 'text-emerald-500');
                elements.badgeText.innerText = "Veilige Verbinding";
                elements.favicon.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${isInternal ? '🏠' : '🛡️'}</text></svg>`;
            } else {
                elements.badgeIcon.classList.replace('bg-slate-500', 'bg-red-500');
                elements.badgeIcon.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.6)";
                elements.badgeText.classList.replace('text-slate-500', 'text-red-500');
                elements.badgeText.innerText = "Onbeveiligde Link";
                elements.favicon.href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚠️</text></svg>";
            }

        } catch (e) {
            elements.domain.innerText = "Ongeldige Link";
        }

        function startRedirect() {
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = timestamp - startTime;
                const percentage = Math.min((progress / redirectDelay) * 100, 100);
                
                elements.progress.style.width = percentage + '%';
                elements.text.innerText = Math.floor(percentage) + '%';
                
                if (progress < redirectDelay) {
                    animationFrame = window.requestAnimationFrame(step);
                } else {
                    if (isUnsafe) {
                        showSafetyWarning();
                    } else {
                        window.location.href = targetURL;
                    }
                }
            }
            animationFrame = window.requestAnimationFrame(step);
        }

        function showSafetyWarning() {
            elements.statusLabel.innerText = "Actie vereist";
            elements.statusDot.classList.replace('animate-ping', 'animate-pulse');
            elements.statusDot.style.backgroundColor = '#ef4444';
            
            elements.overlay.style.display = 'flex';
            setTimeout(() => {
                elements.overlay.style.opacity = '1';
            }, 10);
        }

        elements.confirmBtn.onclick = () => {
            window.location.href = targetURL;
        };

        window.onload = () => {
            startRedirect();
        };
    </script>
</body>
</html>
